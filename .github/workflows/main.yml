- name: Start Streaming
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          # 1. إعداد المدخلات الأساسية (الخلفية دائماً موجودة كمدخل رقم 0)
          INPUTS="-re -loop 1 -framerate 25 -i background.png"
          FILTER="[0:v]scale=1920:1080[bg];"
          CURRENT_V="bg"
          MAP_AUDIO=""
          
          # 2. إضافة الفيديو الأول (مدخل 1)
          if [ -f "videos/video1.mp4" ]; then
            INPUTS="$INPUTS -re -stream_loop -1 -i videos/video1.mp4"
            FILTER="${FILTER}[1:v]scale=845:475[v1];[$CURRENT_V][v1]overlay=0:0[out1];"
            CURRENT_V="out1"
          fi

          # 3. إضافة الفيديو الثاني (مدخل 2)
          if [ -f "videos/video2.mp4" ]; then
            INPUTS="$INPUTS -re -stream_loop -1 -i videos/video2.mp4"
            FILTER="${FILTER}[2:v]scale=845:475[v2];[$CURRENT_V][v2]overlay=0:475[out2];"
            CURRENT_V="out2"
          fi

          # 4. إضافة الفيديو الثالث والتعامل مع الصوت (مدخل 3)
          if [ -f "videos/video3.mp4" ]; then
            INPUTS="$INPUTS -re -stream_loop -1 -i videos/video3.mp4"
            FILTER="${FILTER}[3:v]scale=1075:950[v3];[$CURRENT_V][v3]overlay=845:0[out3];"
            CURRENT_V="out3"
            MAP_AUDIO="-map 3:a" # نستخدم صوت الفيديو الثالث مباشرة
          else
            # إذا لم يوجد فيديو 3، ننشئ مدخل صوت صامت (سيكون رقمه هو آخر رقم مدخل + 1)
            # لحساب الرقم بدقة نستخدم عداد بسيط
            INPUTS="$INPUTS -f lavfi -i anullsrc=channel_layout=stereo:sample_rate=44100"
            # هنا نحتاج لمعرفة ترتيب المدخل الأخير
            AUDIO_INDEX=$(echo "$INPUTS" | grep -o "-i " | wc -l)
            AUDIO_INDEX=$((AUDIO_INDEX - 1))
            MAP_AUDIO="-map ${AUDIO_INDEX}:a"
          fi

          # 5. إضافة النص المتحرك النهائي
          FILTER="${FILTER}[$CURRENT_V]drawtext=text='${{ github.event.inputs.bottom_text }}':fontcolor=white:fontsize=60:x=w-mod(5*t\,w+tw):y=h-80[v_out]"

          # 6. تشغيل الأمر النهائي
          echo "🚀 تشغيل البث المباشر..."
          ffmpeg -hide_banner -loglevel warning \
            $INPUTS \
            -filter_complex "$FILTER" \
            -map "[v_out]" $MAP_AUDIO \
            -c:v libx264 -preset veryfast -b:v 4500k -pix_fmt yuv420p \
            -c:a aac -b:a 128k -ar 44100 -f flv \
            -t $((${{ github.event.inputs.stream_duration }} * 3600)) \
            "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"
