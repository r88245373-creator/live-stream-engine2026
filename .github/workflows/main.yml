name: 24/7 Twitch Professional Stream (Direct URL)

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Enter the direct public download URL for the video'
        required: true
        default: ''

jobs:
  stream:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg wget

      - name: Download & Stream Video
        env:
          STREAM_KEY: ${{ secrets.TWITCH_STREAM_KEY }}
        run: |
          VIDEO_URL="${{ github.event.inputs.video_url }}"

          if [ -z "$VIDEO_URL" ]; then
            echo "Error: video_url is empty!"
            exit 1
          fi

          echo "Downloading video from $VIDEO_URL ..."
          wget -O final_video.mp4 "$VIDEO_URL"

          if [ ! -s final_video.mp4 ]; then
            echo "Error: Video download failed"
            exit 1
          fi

          echo "Starting Twitch stream..."
          ffmpeg -re -stream_loop -1 -i final_video.mp4 \
            -c copy -f flv "rtmp://live.twitch.tv/app/$STREAM_KEY"
