name: Ultimate 24/7 Easy Stream
on:
  schedule:
    - cron: '0 */6 * * *' # إعادة تشغيل كل 6 ساعات
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Start Broadcast
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          # ضع هنا الرابط المباشر للفيديو الذي صدرته من CapCut
          VIDEO_URL: "https://drive.google.com/file/d/1tflRn0FDLgYxJz5J5GKUZHljx_QcC9mU/view?usp=drive_link"
        run: |
          # بث الفيديو في حلقة تكرارية مستمرة
          ffmpeg -re -stream_loop -1 -i "$VIDEO_URL" \
            -c copy -f flv "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"
