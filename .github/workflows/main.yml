name: Ultimate 24/7 Professional Stream 2026
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      url1: { description: 'Video 1 URL (Top Left)', required: true }
      url2: { description: 'Video 2 URL (Bottom Left)', required: true }
      url3: { description: 'Video 3 URL (Right Side + Audio)', required: true }
      bottom_text: { description: 'Scrolling Ticker Text', default: 'LIVE BROADCAST - CONTINUOUS COVERAGE' }
      stream_duration: { description: 'Stream Duration (Max 6 Hours)', default: '6' }

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Download Media Assets
        run: |
          pip3 install gdown
          mkdir -p videos
          dl_gdrive() {
            ID=$(echo "$1" | grep -oE "[a-zA-Z0-9_-]{25,}" | head -1)
            [ -n "$ID" ] && gdown "https://drive.google.com/uc?id=$ID" -O "$2" --quiet || true
          }
          dl_gdrive "${{ github.event.inputs.url1 }}" "videos/v1.mp4"
          dl_gdrive "${{ github.event.inputs.url2 }}" "videos/v2.mp4"
          dl_gdrive "${{ github.event.inputs.url3 }}" "videos/v3.mp4"

      - name: Launch Buffered Engine
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          # 1. إنشاء الخلفية مع إصلاح خطأ الصورة الواحدة
          ffmpeg -f lavfi -i "color=c=#050505:s=1920x1080:d=1" -frames:v 1 background.png -y

          # 2. بناء أمر FFmpeg المصلح
          # تم إضافة -update 1 لفلتر الصورة وإصلاح تسلسل الـ Overlay
          
          ffmpeg -re -loop 1 -i background.png \
            -re -stream_loop -1 -fflags +genpts -i videos/v1.mp4 \
            -re -stream_loop -1 -fflags +genpts -i videos/v2.mp4 \
            -re -stream_loop -1 -fflags +genpts -i videos/v3.mp4 \
            -f lavfi -i anullsrc=cl=stereo:sr=44100 \
            -filter_complex \
            "[0:v]scale=1920:1080[bg]; \
             [1:v]scale=850:478[v1]; \
             [2:v]scale=850:478[v2]; \
             [3:v]scale=1055:961[v3]; \
             [bg][v1]overlay=5:5[ov1]; \
             [ov1][v2]overlay=5:488[ov2]; \
             [ov2][v3]overlay=860:5[ov3]; \
             [ov3]drawbox=y=ih-150:w=iw:h=150:color=0xEE0000@1.0:t=fill[v_bar]; \
             [v_bar]drawtext=text='${{ github.event.inputs.bottom_text }}':fontfile=./Andalus.ttf:fontcolor=white:fontsize=85:x=mod(130*t\,w+tw)-tw:y=h-(150/2)-40[v_out]; \
             [3:a][4:a]amix=inputs=2:duration=first[a_out]" \
            -map "[v_out]" -map "[a_out]" \
            -c:v libx264 -preset veryfast -tune zerolatency -threads 0 \
            -b:v 5500k -maxrate 6000k -bufsize 15000k \
            -pix_fmt yuv420p -g 50 \
            -c:a aac -b:a 128k -ar 44100 -ac 2 -f flv \
            -t $((${{ github.event.inputs.stream_duration }} * 3600)) \
            "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY?rtmp_buffer=10000&rtmp_live=live"
