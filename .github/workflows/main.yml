name: Ultimate 24/7 Professional Stream 2026
on:
  schedule:
    # This attempts to restart the stream every 6 hours automatically
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      url1: { description: 'Video 1 URL (Top Left)', required: true }
      url2: { description: 'Video 2 URL (Bottom Left)', required: true }
      url3: { description: 'Video 3 URL (Right Side + Audio)', required: true }
      bottom_text: { description: 'Scrolling Ticker Text', default: 'LIVE BROADCAST - CONTINUOUS COVERAGE' }
      stream_duration: { description: 'Stream Duration (Max 6 Hours)', default: '6' }

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Download Media Assets
        run: |
          pip3 install gdown
          mkdir -p videos
          dl_gdrive() {
            ID=$(echo "$1" | grep -oE "[a-zA-Z0-9_-]{25,}" | head -1)
            [ -n "$ID" ] && gdown "https://drive.google.com/uc?id=$ID" -O "$2" --quiet || true
          }
          dl_gdrive "${{ github.event.inputs.url1 }}" "videos/v1.mp4"
          dl_gdrive "${{ github.event.inputs.url2 }}" "videos/v2.mp4"
          dl_gdrive "${{ github.event.inputs.url3 }}" "videos/v3.mp4"

      - name: Launch Buffered Engine
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          # Create solid 1080p background
          ffmpeg -f lavfi -i "color=c=#050505:s=1920x1080" -frames:v 1 background.png -y

          # Setup inputs and layout filter
          INPUTS="-re -loop 1 -i background.png"
          FILTER="[0:v]scale=1920:1080[bg];"
          LAST_V="bg"
          idx=1

          # Layout Videos 1 & 2 (Left Side)
          for i in 1 2; do
            if [ -s "videos/v$i.mp4" ]; then
              INPUTS="$INPUTS -re -stream_loop -1 -fflags +genpts -i videos/v$i.mp4"
              [ $i -eq 1 ] && pos="5:5" || pos="5:488"
              FILTER="${FILTER}[$idx:v]scale=850:478[v$i];[$LAST_V][v$i]overlay=$pos[ov$i];"
              [ $i -eq 1 ] && LAST_V="ov1" || LAST_V="ov2"
              idx=$((idx+1))
            fi
          done

          # Layout Video 3 (Right Side) + Audio Source
          if [ -s "videos/v3.mp4" ]; then
            INPUTS="$INPUTS -re -stream_loop -1 -fflags +genpts -i videos/v3.mp4"
            FILTER="${FILTER}[$LAST_V][$idx:v]scale=1055:961[v3];[v3]overlay=860:5[ov3];"
            LAST_V="ov3"
            AUDIO_MAP="-map $idx:a"
            idx=$((idx+1))
          else
            INPUTS="$INPUTS -f lavfi -i anullsrc=cl=stereo:sr=44100"
            AUDIO_MAP="-map $idx:a"
            FILTER="${FILTER}[$LAST_V]null[ov3];"
            LAST_V="ov3"
          fi

          # Ticker Bar Settings (Height 150px, Font Size 85)
          BAR_H=150
          FILTER="${FILTER}[ov3]drawbox=y=ih-$BAR_H:w=iw:h=$BAR_H:color=0xEE0000@1.0:t=fill[v_bar];"
          FILTER="${FILTER}[v_bar]drawtext=text='${{ github.event.inputs.bottom_text }}':\
          fontfile=./Andalus.ttf:fontcolor=white:fontsize=85:\
          x=mod(130*t\,w+tw)-tw:y=h-($BAR_H/2)-40[v_out]"

          # Optimized 10s Buffered Broadcast
          # Uses veryfast preset for high quality and 15000k buffer for stability
          ffmpeg -hide_banner -loglevel warning \
            -thread_queue_size 1024 $INPUTS \
            -filter_complex "$FILTER" -map "[v_out]" $AUDIO_MAP \
            -c:v libx264 -preset veryfast -tune zerolatency -threads 0 \
            -b:v 5500k -maxrate 6000k -bufsize 15000k \
            -pix_fmt yuv420p -g 50 -keyint_min 50 \
            -c:a aac -b:a 128k -ar 44100 -f flv \
            "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY?rtmp_buffer=10000&rtmp_live=live"
