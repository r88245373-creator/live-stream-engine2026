name: Ultimate Stream 2026
on:
  workflow_dispatch:
    inputs:
      url1:
        description: 'Video 1 (Green)'
        required: true
      url2:
        description: 'Video 2 (Red)'
        required: true
      url3:
        description: 'Video 3 (Blue - Main Audio)'
        required: true
      bottom_text:
        description: 'Bottom Ticker Text'
        required: false
        default: 'LIVE - Continuous Coverage'
      stream_duration:
        description: 'Duration (hours)'
        required: false
        default: '6'
      background_image:
        description: 'Background Image URL (optional)'
        required: false
        default: 'background_v5.png'

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 432
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            fonts-dejavu-core \
            python3-pip \
            python3-setuptools \
            wget \
            curl \
            jq
          pip3 install --upgrade gdown

      - name: Create Working Directory
        run: |
          mkdir -p videos
          mkdir -p logs

      - name: Download Videos (Optional)
        id: download
        run: |
          # Function to extract Google Drive ID from various URL formats
          extract_gdrive_id() {
            local url="$1"
            local id=""
            
            # Pattern 1: /d/ID/view - escape the /d/ part
            if [[ $url =~ /d/([a-zA-Z0-9_-]+) ]]; then
              id="${BASH_REMATCH[1]}"
            # Pattern 2: id=ID - use character class for ? and &
            elif [[ $url =~ [\?]id=([a-zA-Z0-9_-]+) ]] || [[ $url =~ [\&]id=([a-zA-Z0-9_-]+) ]]; then
              # Check both patterns separately
              if [[ $url =~ [\?]id=([a-zA-Z0-9_-]+) ]]; then
                id="${BASH_REMATCH[1]}"
              elif [[ $url =~ [\&]id=([a-zA-Z0-9_-]+) ]]; then
                id="${BASH_REMATCH[1]}"
              fi
            # Pattern 3: direct ID (25+ characters)
            elif [[ $url =~ ^[a-zA-Z0-9_-]{25,}$ ]]; then
              id="$url"
            # Pattern 4: open?id= format
            elif [[ $url =~ open\?id=([a-zA-Z0-9_-]+) ]]; then
              id="${BASH_REMATCH[1]}"
            # Pattern 5: file/d/ID format
            elif [[ $url =~ file/d/([a-zA-Z0-9_-]+) ]]; then
              id="${BASH_REMATCH[1]}"
            fi
            
            echo "$id"
          }
          
          download_video() {
            local url="$1"
            local output="$2"
            local video_num="$3"
            
            # Skip if URL is empty
            if [ -z "$url" ] || [ "$url" = "null" ]; then
              echo "⚠️ Video $video_num: No URL provided - will show background only"
              echo "video${video_num}_available=false" >> $GITHUB_ENV
              return 1
            fi
            
            echo "📥 Video $video_num: Processing URL: $url"
            
            # Try different download methods
            local success=false
            
            # Method 1: Check if it's a Google Drive link
            if [[ $url == *"drive.google.com"* ]] || [[ $url == *"docs.google.com"* ]]; then
              ID=$(extract_gdrive_id "$url")
              
              if [ -n "$ID" ]; then
                echo "📥 Video $video_num: Google Drive ID detected: $ID"
                
                # Try gdown first (most reliable for Google Drive)
                echo "   Attempting download with gdown..."
                if gdown "https://drive.google.com/uc?id=$ID" -O "$output" --quiet 2>/dev/null; then
                  if [ -s "$output" ]; then
                    echo "✅ Video $video_num: Downloaded successfully with gdown"
                    success=true
                  fi
                fi
                
                # If gdown fails, try direct download with wget
                if [ "$success" = false ]; then
                  echo "   Attempting download with wget..."
                  # Try to get the file directly
                  wget --no-check-certificate \
                    "https://drive.google.com/uc?export=download&id=$ID" \
                    -O "$output" 2>/dev/null
                  
                  # Check if it's a small file (might be a confirmation page)
                  if [ -f "$output" ]; then
                    filesize=$(stat -c%s "$output" 2>/dev/null || stat -f%z "$output" 2>/dev/null)
                    if [ "$filesize" -lt 100000 ] && grep -q "Google Drive" "$output" 2>/dev/null; then
                      # This is probably a confirmation page, try to get the real file
                      rm -f "$output"
                      # Use a different approach with cookies
                      wget --no-check-certificate \
                        --save-cookies /tmp/gdrive_cookies.txt \
                        "https://drive.google.com/uc?export=download&id=$ID" \
                        -O /tmp/gdrive_page.html 2>/dev/null
                      
                      # Extract confirmation code
                      CONFIRM=$(grep -o 'confirm=[^&]*' /tmp/gdrive_page.html | head -1 | cut -d'=' -f2)
                      if [ -n "$CONFIRM" ]; then
                        wget --no-check-certificate \
                          --load-cookies /tmp/gdrive_cookies.txt \
                          "https://drive.google.com/uc?export=download&confirm=$CONFIRM&id=$ID" \
                          -O "$output" 2>/dev/null
                      fi
                    fi
                  fi
                  
                  if [ -s "$output" ]; then
                    echo "✅ Video $video_num: Downloaded successfully with wget"
                    success=true
                  fi
                fi
                
                # Try curl as last resort
                if [ "$success" = false ]; then
                  echo "   Attempting download with curl..."
                  curl -L -b /tmp/gdrive_cookies.txt \
                    "https://drive.google.com/uc?export=download&id=$ID" \
                    -o "$output" 2>/dev/null
                  if [ -s "$output" ]; then
                    echo "✅ Video $video_num: Downloaded successfully with curl"
                    success=true
                  fi
                fi
              fi
            fi
            
            # Method 2: Try direct download if not Google Drive or if Google Drive failed
            if [ "$success" = false ]; then
              echo "   Attempting direct download..."
              if wget --timeout=30 --no-check-certificate -O "$output" "$url" 2>/dev/null && [ -s "$output" ]; then
                echo "✅ Video $video_num: Downloaded successfully via direct link"
                success=true
              elif curl --max-time 30 -L -k -o "$output" "$url" 2>/dev/null && [ -s "$output" ]; then
                echo "✅ Video $video_num: Downloaded successfully with curl"
                success=true
              fi
            fi
            
            if [ "$success" = true ]; then
              # Verify it's a valid video file
              if ffprobe -v quiet -show_format "$output" > /dev/null 2>&1; then
                echo "✅ Video $video_num: Valid video file"
                echo "video${video_num}_available=true" >> $GITHUB_ENV
                
                # Get video info
                duration=$(ffprobe -v quiet -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$output" 2>/dev/null)
                if [ -n "$duration" ]; then
                  echo "   Duration: $(printf "%.2f" $duration) seconds"
                fi
                return 0
              else
                echo "⚠️ Video $video_num: Downloaded file is not a valid video"
                rm -f "$output"
              fi
            fi
            
            echo "⚠️ Video $video_num: All download methods failed - will show background only"
            echo "video${video_num}_available=false" >> $GITHUB_ENV
            return 1
          }
          
          # Download all videos sequentially
          echo "=== Starting Video Downloads ==="
          echo ""
          
          echo "📹 Video 1 (Green):"
          download_video "${{ github.event.inputs.url1 }}" "videos/video1.mp4" 1
          echo ""
          
          echo "📹 Video 2 (Red):"
          download_video "${{ github.event.inputs.url2 }}" "videos/video2.mp4" 2
          echo ""
          
          echo "📹 Video 3 (Blue - Main Audio):"
          download_video "${{ github.event.inputs.url3 }}" "videos/video3.mp4" 3
          echo ""
          
          echo "=== Download Process Completed ==="
          echo ""
          
          # Show summary
          echo "📊 Download Summary:"
          echo "   Video 1 Available: ${video1_available:-false}"
          echo "   Video 2 Available: ${video2_available:-false}"
          echo "   Video 3 Available: ${video3_available:-false}"

      - name: Validate Background Image
        run: |
          BG_IMAGE="${{ github.event.inputs.background_image }}"
          
          echo "🖼️ Checking background image..."
          
          # Check if background exists
          if [ -f "$BG_IMAGE" ]; then
            echo "✅ Using local background: $BG_IMAGE"
            cp "$BG_IMAGE" "background.png"
          elif [[ "$BG_IMAGE" =~ ^https?:// ]]; then
            echo "📥 Downloading background from URL"
            if wget -q -O "background.png" "$BG_IMAGE" 2>/dev/null && [ -s "background.png" ]; then
              echo "✅ Background downloaded successfully"
            else
              echo "⚠️ Background download failed, creating gradient background"
              ffmpeg -f lavfi -i "gradients=s=1920x1080:c0=#1a1a2e:c1=#16213e" -frames:v 1 "background.png" -y > /dev/null 2>&1
            fi
          else
            # Try to find any PNG or JPG file
            BG_FILE=$(find . -maxdepth 1 -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" | head -1)
            if [ -n "$BG_FILE" ]; then
              cp "$BG_FILE" "background.png"
              echo "✅ Using found background: $BG_FILE"
            else
              echo "⚠️ No background found, creating gradient background"
              ffmpeg -f lavfi -i "gradients=s=1920x1080:c0=#1a1a2e:c1=#16213e" -frames:v 1 "background.png" -y > /dev/null 2>&1
            fi
          fi

      - name: Prepare Stream Command
        id: prepare
        run: |
          # Sanitize text for drawtext filter
          BOTTOM_TEXT='${{ github.event.inputs.bottom_text }}'
          BOTTOM_TEXT=$(echo "$BOTTOM_TEXT" | sed 's/[\\:]/\\&/g' | sed "s/'/\\\\'/g" | sed 's/"/\\"/g')
          
          # Calculate duration in seconds
          DURATION_SEC=$(( ${{ github.event.inputs.stream_duration }} * 3600 ))
          echo "duration=$DURATION_SEC" >> $GITHUB_OUTPUT
          echo "text=$BOTTOM_TEXT" >> $GITHUB_OUTPUT
          
          # Get video availability (default to false if not set)
          V1_AVAIL="${video1_available:-false}"
          V2_AVAIL="${video2_available:-false}"
          V3_AVAIL="${video3_available:-false}"
          
          # Build filter complex
          FILTER_COMPLEX="[0:v]scale=1920:1080:force_original_aspect_ratio=decrease,pad=1920:1080:(ow-iw)/2:(oh-ih)/2[bg];"
          
          INPUTS=""
          INPUT_INDEX=1
          CURRENT_OUTPUT="bg"
          
          # Video 1 (Top left)
          if [ "$V1_AVAIL" = "true" ] && [ -f "videos/video1.mp4" ]; then
            echo "✅ Video 1 available"
            FILTER_COMPLEX="${FILTER_COMPLEX}[${INPUT_INDEX}:v]scale=845:475:force_original_aspect_ratio=increase,crop=845:475[v1];"
            FILTER_COMPLEX="${FILTER_COMPLEX}[${CURRENT_OUTPUT}][v1]overlay=0:0[out1];"
            INPUTS="${INPUTS} -re -stream_loop -1 -i videos/video1.mp4"
            INPUT_INDEX=$((INPUT_INDEX + 1))
            CURRENT_OUTPUT="out1"
          else
            echo "ℹ️ Video 1 not available"
            FILTER_COMPLEX="${FILTER_COMPLEX}[${CURRENT_OUTPUT}]null[out1];"
            CURRENT_OUTPUT="out1"
          fi
          
          # Video 2 (Bottom left)
          if [ "$V2_AVAIL" = "true" ] && [ -f "videos/video2.mp4" ]; then
            echo "✅ Video 2 available"
            FILTER_COMPLEX="${FILTER_COMPLEX}[${INPUT_INDEX}:v]scale=845:475:force_original_aspect_ratio=increase,crop=845:475[v2];"
            FILTER_COMPLEX="${FILTER_COMPLEX}[${CURRENT_OUTPUT}][v2]overlay=0:475[out2];"
            INPUTS="${INPUTS} -re -stream_loop -1 -i videos/video2.mp4"
            INPUT_INDEX=$((INPUT_INDEX + 1))
            CURRENT_OUTPUT="out2"
          else
            echo "ℹ️ Video 2 not available"
            FILTER_COMPLEX="${FILTER_COMPLEX}[${CURRENT_OUTPUT}]null[out2];"
            CURRENT_OUTPUT="out2"
          fi
          
          # Video 3 (Right side)
          if [ "$V3_AVAIL" = "true" ] && [ -f "videos/video3.mp4" ]; then
            echo "✅ Video 3 available"
            FILTER_COMPLEX="${FILTER_COMPLEX}[${INPUT_INDEX}:v]scale=1075:950:force_original_aspect_ratio=decrease,pad=1075:950:(ow-iw)/2:(oh-ih)/2[v3];"
            FILTER_COMPLEX="${FILTER_COMPLEX}[${CURRENT_OUTPUT}][v3]overlay=845:0[out3];"
            INPUTS="${INPUTS} -re -stream_loop -1 -i videos/video3.mp4"
            INPUT_INDEX=$((INPUT_INDEX + 1))
            CURRENT_OUTPUT="out3"
          else
            echo "ℹ️ Video 3 not available"
            FILTER_COMPLEX="${FILTER_COMPLEX}[${CURRENT_OUTPUT}]null[out3];"
            CURRENT_OUTPUT="out3"
          fi
          
          # Add scrolling text
          FILTER_COMPLEX="${FILTER_COMPLEX}[${CURRENT_OUTPUT}]drawtext=text='$BOTTOM_TEXT':fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf:fontcolor=white:fontsize=65:x=w-mod(5*t\,w+tw):y=h-85:shadowcolor=black:shadowx=2:shadowy=2[v_out]"
          
          echo "filter_complex=$FILTER_COMPLEX" >> $GITHUB_OUTPUT
          echo "inputs=$INPUTS" >> $GITHUB_OUTPUT
          echo "input_count=$INPUT_INDEX" >> $GITHUB_OUTPUT
          
          # Log configuration
          echo "⚙️ Configuration:"
          echo "   Duration: $DURATION_SEC seconds"
          echo "   Bottom Text: $BOTTOM_TEXT"
          echo "   Video 1 Available: $V1_AVAIL"
          echo "   Video 2 Available: $V2_AVAIL"
          echo "   Video 3 Available: $V3_AVAIL"

      - name: Start Streaming
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          # Validate stream key
          if [ -z "$STREAM_KEY" ]; then
            echo "❌ Error: YOUTUBE_STREAM_KEY secret is not set"
            exit 1
          fi
          
          echo "🚀 Starting stream for ${{ github.event.inputs.stream_duration }} hours"
          
          # Build audio inputs
          if [ "${video3_available:-false}" = "true" ] && [ -f "videos/video3.mp4" ]; then
            # Use audio from video 3 if available
            AUDIO_MAP="-map ${{ steps.prepare.outputs.input_count }}:a"
            echo "🔊 Using audio from Video 3 (Blue)"
          else
            # Use silent audio
            AUDIO_MAP="-f lavfi -i anullsrc=channel_layout=stereo:sample_rate=44100 -map ${{ steps.prepare.outputs.input_count }}:a"
            echo "🔇 No audio source available - using silent audio"
          fi
          
          # Display stream info
          echo "📺 Stream Layout:"
          echo "   - Background: 1920x1080"
          echo "   - Video areas will show background if videos unavailable"
          echo ""
          echo "⏱️ Stream duration: ${{ github.event.inputs.stream_duration }} hours"
          echo ""
          
          # Construct and run FFmpeg command
          ffmpeg -hide_banner -loglevel warning \
            -re -loop 1 -framerate 25 -i "background.png" \
            ${{ steps.prepare.outputs.inputs }} \
            $([ "${video3_available:-false}" != "true" ] && echo "-f lavfi -i anullsrc=channel_layout=stereo:sample_rate=44100") \
            -filter_complex "${{ steps.prepare.outputs.filter_complex }}" \
            -map "[v_out]" \
            $AUDIO_MAP \
            -c:v libx264 -preset veryfast -tune zerolatency \
            -b:v 6000k -maxrate 8000k -bufsize 12000k \
            -pix_fmt yuv420p -g 50 -keyint_min 50 \
            -c:a aac -b:a 128k -ar 44100 \
            -f flv -t ${{ steps.prepare.outputs.duration }} \
            "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY" 2>&1 | tee logs/ffmpeg.log
          
          # Check exit status
          EXIT_CODE=$?
          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ Stream completed successfully"
          else
            echo "❌ Stream failed with exit code: $EXIT_CODE"
            echo "📝 Check logs/ffmpeg.log for details"
            exit $EXIT_CODE
          fi

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stream-logs
          path: logs/
          retention-days: 7
