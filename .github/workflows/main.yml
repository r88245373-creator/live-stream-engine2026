name: 🔴 YouTube 24/7 - FIXED STREAM

on:
  workflow_dispatch:
    inputs:
      link1:
        description: 'Google Drive FILE ID for Video 1 (NOT the full URL)'
        required: true
      link2:
        description: 'Google Drive FILE ID for Video 2 (NOT the full URL)'
        required: true
      link3:
        description: 'Google Drive FILE ID for Video 3 (NOT the full URL)'
        required: true

jobs:
  stream:
    runs-on: ubuntu-latest

    steps:
      - name: ⚡ Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg bc -qq
          pip install -q gdown

      - name: 📥 Download videos
        run: |
          mkdir -p videos
          cd videos
          
          echo "📥 Downloading video 1..."
          echo "Using ID: ${{ inputs.link1 }}"
          gdown "${{ inputs.link1 }}" -O 1.mp4 || echo "❌ Failed to download video 1"
          
          echo "📥 Downloading video 2..."
          echo "Using ID: ${{ inputs.link2 }}"
          gdown "${{ inputs.link2 }}" -O 2.mp4 || echo "❌ Failed to download video 2"
          
          echo "📥 Downloading video 3..."
          echo "Using ID: ${{ inputs.link3 }}"
          gdown "${{ inputs.link3 }}" -O 3.mp4 || echo "❌ Failed to download video 3"
          
          echo "✅ Files in videos folder:"
          ls -la
          
          # Check if files exist and have size > 0
          if [ ! -s "1.mp4" ] || [ ! -s "2.mp4" ] || [ ! -s "3.mp4" ]; then
            echo "❌ ERROR: One or more videos failed to download!"
            exit 1
          fi

      - name: 🔧 Prepare playlist and GOP
        run: |
          cd videos
          
          # Create playlist
          echo "file '1.mp4'" > playlist.txt
          echo "file '2.mp4'" >> playlist.txt
          echo "file '3.mp4'" >> playlist.txt
          
          echo "📋 Playlist created:"
          cat playlist.txt
          
          # Get FPS from first video
          FPS=$(ffprobe -v error -select_streams v:0 -show_entries stream=r_frame_rate \
                -of default=nokey=1:noprint_wrappers=1 1.mp4 | bc -l | awk '{printf "%.0f", $1}')
          
          # Default to 30 if FPS detection fails
          if [ -z "$FPS" ] || [ "$FPS" -eq 0 ]; then
            FPS=30
          fi
          
          GOP=$((FPS * 2))
          echo "🎯 FPS: $FPS | GOP: $GOP frames (2 seconds)"
          
          # Save values for next step
          echo "FPS=$FPS" >> $GITHUB_ENV
          echo "GOP=$GOP" >> $GITHUB_ENV

      - name: 🔴 Start 24/7 Stream
        env:
          KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          cd videos
          
          echo "🚀 Starting 24/7 stream..."
          echo "🎬 Streaming videos in loop: 1.mp4, 2.mp4, 3.mp4"
          
          # Verify playlist exists
          if [ ! -f "playlist.txt" ]; then
            echo "❌ ERROR: playlist.txt not found!"
            exit 1
          fi
          
          while true; do
            echo "▶️ Starting stream loop at $(date)"
            ffmpeg -stream_loop -1 -re -f concat -safe 0 -i playlist.txt \
              -c:v libx264 -preset ultrafast -b:v 2500k -maxrate 2500k -bufsize 5000k \
              -g $GOP -keyint_min $GOP -forced-idr 1 \
              -c:a aac -b:a 128k -ar 44100 \
              -f flv "rtmp://a.rtmp.youtube.com/live2/$KEY"
            
            echo "😴 Stream ended at $(date), retrying in 30 seconds..."
            sleep 30
          done
