name: 🔴 YouTube 24/7 - FIXED KEYFRAMES

on:
  workflow_dispatch:
    inputs:
      link1:
        description: '🔗 Google Drive Link #1'
        required: true
      link2:
        description: '🔗 Google Drive Link #2'
        required: true
      link3:
        description: '🔗 Google Drive Link #3'
        required: true

jobs:
  stream:
    runs-on: ubuntu-latest
    
    steps:
      - name: ⚡ Install Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg -qq
          pip install -q gdown

      - name: 🔍 Extract IDs & Download
        run: |
          # Smart ID extraction
          extract_id() {
            local link="$1"
            [[ "$link" =~ /file/d/([^/]+) ]] && echo "${BASH_REMATCH[1]}" && return
            [[ "$link" =~ id=([^&]+) ]] && echo "${BASH_REMATCH[1]}" && return
            echo "$link"
          }
          
          ID1=$(extract_id "${{ inputs.link1 }}")
          ID2=$(extract_id "${{ inputs.link2 }}")
          ID3=$(extract_id "${{ inputs.link3 }}")
          
          # Download videos
          gdown --id "$ID1" -O video1.mp4
          gdown --id "$ID2" -O video2.mp4
          gdown --id "$ID3" -O video3.mp4

      - name: 🔧 FIX KEYFRAMES & Stream
        env:
          KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          # Create directory
          mkdir -p stream
          cd stream
          
          # Copy videos
          cp ../video1.mp4 .
          cp ../video2.mp4 .
          cp ../video3.mp4 .
          
          echo "🔧 FIXING KEYFRAME ISSUE - Setting GOP to 2 seconds"
          echo "=================================================="
          
          # Fix each video - force keyframes every 2 seconds
          for i in 1 2 3; do
            echo "🛠️ Fixing video $i..."
            ffmpeg -i video$i.mp4 \
              -c:v libx264 -preset fast \
              -g 48 \                    # Keyframe every 2 seconds (at 24fps)
              -keyint_min 48 \            # Minimum keyframe interval
              -sc_threshold 0 \           # No scene detection (force exact intervals)
              -c:a copy \
              -y fixed_$i.mp4
          done
          
          # Create playlist with fixed videos
          echo "file 'fixed_1.mp4'" > playlist.txt
          echo "file 'fixed_2.mp4'" >> playlist.txt
          echo "file 'fixed_3.mp4'" >> playlist.txt
          
          echo "🚀 Starting stream with CORRECT keyframes..."
          echo "⏱️  Keyframe interval: 2 seconds (YouTube requirement: ≤4 seconds)"
          
          # Stream with proper keyframes
          while true; do
            timeout 18000 ffmpeg -re -stream_loop -1 -f concat -safe 0 -i playlist.txt \
              -c:v libx264 -preset ultrafast \
              -g 48 \                    # Force keyframes during stream
              -keyint_min 48 \
              -forced-idr 1 \             # Force IDR frames (strong keyframes)
              -c:a copy \
              -f flv "rtmp://a.rtmp.youtube.com/live2/$KEY"
            
            echo "😴 Sleeping 90s..."
            sleep 90
          done
