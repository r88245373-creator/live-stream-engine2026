name: 24/7 Twitch Professional Stream

on:
  workflow_dispatch:
    inputs:
      video_id:
        description: 'Enter the Google Drive video ID or link'
        required: true
        default: ''

jobs:
  stream:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Tools (FFmpeg & gdown)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install gdown

      - name: Download & Stream from Google Drive
        env:
          STREAM_KEY: ${{ secrets.TWITCH_STREAM_KEY }}
        run: |
          VIDEO_ID="${{ github.event.inputs.video_id }}"

          if [ -z "$VIDEO_ID" ]; then
            echo "Error: video_id is empty!"
            exit 1
          fi

          # Download video from Google Drive
          gdown --id "$VIDEO_ID" -O final_video.mp4

          # Check if the video exists
          if [ ! -s final_video.mp4 ]; then
            echo "Error: Video download failed"
            exit 1
          fi

          # Stream the video in a loop to Twitch
          ffmpeg -re -stream_loop -1 -i final_video.mp4 \
            -c copy -f flv "rtmp://live.twitch.tv/app/$STREAM_KEY"
