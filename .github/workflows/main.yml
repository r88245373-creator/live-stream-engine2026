name: 24/7 Professional Live Stream (Optimized)

on:
  schedule:
    - cron: '0 */6 * * *' # Restarts every 6 hours to stay within GitHub limits
  workflow_dispatch:
    inputs:
      video_link:
        description: 'Google Drive Video URL'
        required: true
        default: 'https://drive.google.com/file/d/1uPIsRiVT8rzx5Qmtp7_Ccg8sZIi-ucjW/view'

# Add permissions to secure the workflow
permissions:
  contents: read

jobs:
  stream:
    runs-on: ubuntu-latest
    # Add timeout to prevent unlimited execution
    timeout-minutes: 360
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Performance improvement: don't download history
          fetch-depth: 1

      # Optimization: Use faster APT mirrors
      - name: Optimize APT sources
        run: |
          sudo sed -i 's/archive.ubuntu.com/mirror.rackspace.com/g' /etc/apt/sources.list

      # 1. Performance: Python setup WITHOUT cache dependency (fix for the error)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'  # Specific version for stability
          # Remove cache-dependency-path to avoid the error
          cache: 'pip'

      # 2. Create requirements file for caching
      - name: Create requirements file
        run: |
          echo "gdown" > requirements.txt
          echo "yt-dlp" >> requirements.txt
          
      # 3. Fast Installation: Parallel and optimized
      - name: Install Dependencies Fast
        run: |
          # Fast update without unnecessary recommended packages
          sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            aria2 \
            jq \
            bc \
            procps
          
          # Install pip packages without cache for reliability
          pip install --upgrade pip
          pip install gdown yt-dlp

      # 4. Pro Download: Smart with retry mechanism and fallback options
      - name: Smart Video Download
        env:
          RAW_INPUT: ${{ github.event.inputs.video_link || '1uPIsRiVT8rzx5Qmtp7_Ccg8sZIi-ucjW' }}
        run: |
          # Function to extract ID from different URL formats
          extract_id() {
            local url="$1"
            # Google Drive
            if echo "$url" | grep -q "drive.google.com"; then
              echo "$url" | sed -E 's/.*\/d\/([^/]+).*/\1/' | sed -E 's/.*id=([^&]+).*/\1/'
            # Direct link
            elif echo "$url" | grep -q "docs.google.com"; then
              echo "$url" | sed -E 's/.*\/d\/([^/]+).*/\1/'
            else
              echo "$url"
            fi
          }
          
          VIDEO_ID=$(extract_id "$RAW_INPUT")
          echo "Processing: $VIDEO_ID"
          
          # Multi-stage download with retry and fallback methods
          MAX_RETRIES=3
          DOWNLOAD_SUCCESS=false
          
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i of $MAX_RETRIES"
            
            # Try gdown first
            if gdown --id "$VIDEO_ID" -O stream_file.mp4 --fuzzy --remaining-ok; then
              echo "Download successful with gdown!"
              DOWNLOAD_SUCCESS=true
              break
            else
              echo "gdown failed, trying yt-dlp..."
              # Try yt-dlp as fallback
              if yt-dlp --quiet --no-warnings -o "stream_file.mp4" "https://drive.google.com/file/d/$VIDEO_ID/view"; then
                echo "Download successful with yt-dlp!"
                DOWNLOAD_SUCCESS=true
                break
              else
                echo "Download failed, retrying in 5 seconds..."
                sleep 5
              fi
            fi
          done
          
          if [ "$DOWNLOAD_SUCCESS" = false ]; then
            echo "Error: All download attempts failed!"
            exit 1
          fi
          
          # Verify file integrity
          if [ ! -f stream_file.mp4 ]; then
            echo "Error: File not found after download!"
            exit 1
          fi
          
          # Check if file is valid video
          if ! ffprobe -v error -show_format stream_file.mp4 > /dev/null 2>&1; then
            echo "Error: Downloaded file is not a valid video!"
            exit 1
          fi
          
          # Display file information
          FILE_SIZE=$(du -h stream_file.mp4 | cut -f1)
          DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 stream_file.mp4 2>/dev/null || echo "Unknown")
          
          echo "✅ Download successful!"
          echo "File size: $FILE_SIZE"
          echo "Duration: $DURATION seconds"

      # 5. Pro Stream: Advanced settings with monitoring and auto-reconnect
      - name: Start Professional Stream
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          RTMP_URL: "rtmp://a.rtmp.youtube.com/live2"
        run: |
          # Verify key exists
          if [ -z "$STREAM_KEY" ]; then
            echo "Error: STREAM_KEY not set"
            exit 1
          fi
          
          # Create logs directory
          mkdir -p logs
          
          echo "Starting Optimized Stream to YouTube..."
          echo "Stream started at: $(date)" > logs/stream.log
          
          # Professional FFmpeg settings with auto-reconnect
          while true; do
            echo "Starting FFmpeg process at $(date)" | tee -a logs/stream.log
            
            ffmpeg -hide_banner -loglevel warning \
              -re -stream_loop -1 -i stream_file.mp4 \
              -fflags +genpts \
              -use_wallclock_as_timestamps 1 \
              -vcodec copy -acodec copy \
              -f flv \
              -flush_packets 1 \
              -max_muxing_queue_size 9999 \
              "${RTMP_URL}/${STREAM_KEY}" 2>&1 | tee -a logs/stream.log
            
            EXIT_CODE=$?
            echo "FFmpeg exited with code $EXIT_CODE at $(date)" | tee -a logs/stream.log
            
            if [ $EXIT_CODE -eq 0 ]; then
              echo "Stream ended normally. Exiting..." | tee -a logs/stream.log
              break
            else
              echo "Stream crashed. Restarting in 5 seconds..." | tee -a logs/stream.log
              sleep 5
            fi
          done

      # 6. Health Check: Monitor stream status
      - name: Monitor Stream Health
        if: always()
        run: |
          echo "=== Stream Health Report ==="
          
          # Display last 20 lines of log
          if [ -f logs/stream.log ]; then
            echo "📋 Last 20 lines of stream log:"
            echo "-----------------------------"
            tail -20 logs/stream.log
            echo "-----------------------------"
          fi
          
          # Check for errors
          if [ -f logs/stream.log ] && grep -i "error\|failed\|crash" logs/stream.log; then
            ERROR_COUNT=$(grep -i "error\|failed\|crash" logs/stream.log | wc -l)
            echo "⚠️  Found $ERROR_COUNT errors in logs!"
          else
            echo "✅ No errors detected in logs"
          fi
          
          # Display total runtime if available
          if [ -f logs/stream.log ] && grep -q "Stream started at:" logs/stream.log; then
            START_TIME=$(grep "Stream started at:" logs/stream.log | head -1 | sed 's/Stream started at: //')
            echo "Stream started: $START_TIME"
          fi

      # 7. Smart Cleanup: Intelligent cleanup with log retention
      - name: Smart Cleanup
        if: always()
        run: |
          echo "🧹 Running cleanup..."
          
          # Delete only video (not logs)
          if [ -f stream_file.mp4 ]; then
            rm -f stream_file.mp4
            echo "✅ Video file removed"
          else
            echo "ℹ️ No video file to remove"
          fi
          
          # Compress logs if too large
          if [ -f logs/stream.log ]; then
            LOG_SIZE=$(stat -c%s logs/stream.log 2>/dev/null || stat -f%z logs/stream.log 2>/dev/null || echo "0")
            if [ "$LOG_SIZE" -gt 1048576 ]; then  # 1MB
              gzip -9 logs/stream.log
              echo "✅ Logs compressed (was >1MB)"
            else
              echo "ℹ️ Logs size OK ($(du -h logs/stream.log | cut -f1))"
            fi
          fi
          
          echo "Cleanup completed at: $(date)"
          echo "Disk space remaining:"
          df -h / | tail -1
