name: 24/7 Professional Live Stream (Optimized)

on:
  schedule:
    - cron: '0 */6 * * *' # Restarts every 6 hours to stay within GitHub limits
  workflow_dispatch:
    inputs:
      video_link:
        description: 'Google Drive Video URL'
        required: true
        default: 'https://drive.google.com/file/d/1uPIsRiVT8rzx5Qmtp7_Ccg8sZIi-ucjW/view'

# Add permissions to secure the workflow
permissions:
  contents: read

jobs:
  stream:
    runs-on: ubuntu-latest
    # Add timeout to prevent unlimited execution
    timeout-minutes: 360
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Performance improvement: don't download history
          fetch-depth: 1

      # Optimization: Use faster APT mirrors
      - name: Optimize APT sources
        run: |
          sudo sed -i 's/archive.ubuntu.com/mirror.rackspace.com/g' /etc/apt/sources.list

      # 1. Performance: Advanced caching with path specification
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'  # Specific version for stability
          cache: 'pip'
          cache-dependency-path: |
            **/requirements.txt
            pyproject.toml

      # 2. Fast Installation: Parallel and optimized
      - name: Install Dependencies Fast
        run: |
          # Fast update without unnecessary recommended packages
          sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            aria2 \
            jq
          # Install pip packages with caching
          pip install --no-cache-dir --upgrade pip
          pip install --no-cache-dir gdown yt-dlp

      # 3. Pro Download: Smart with retry mechanism
      - name: Smart Video Download
        env:
          RAW_INPUT: ${{ github.event.inputs.video_link || '1uPIsRiVT8rzx5Qmtp7_Ccg8sZIi-ucjW' }}
        run: |
          # Function to extract ID from different URL formats
          extract_id() {
            local url="$1"
            # Google Drive
            if echo "$url" | grep -q "drive.google.com"; then
              echo "$url" | sed -E 's/.*\/d\/([^/]+).*/\1/' | sed -E 's/.*id=([^&]+).*/\1/'
            # Direct link
            elif echo "$url" | grep -q "docs.google.com"; then
              echo "$url" | sed -E 's/.*\/d\/([^/]+).*/\1/'
            else
              echo "$url"
            fi
          }
          
          VIDEO_ID=$(extract_id "$RAW_INPUT")
          echo "Processing: $VIDEO_ID"
          
          # Multi-stage download with retry
          MAX_RETRIES=3
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i of $MAX_RETRIES"
            
            # Use gdown with optimized options
            if gdown --id "$VIDEO_ID" -O stream_file.mp4 --fuzzy --remaining-ok; then
              echo "Download successful!"
              break
            else
              echo "Download failed, retrying in 5 seconds..."
              sleep 5
            fi
          done
          
          # Verify file integrity
          if [ ! -s stream_file.mp4 ]; then
            echo "Error: File is empty or download failed!"
            exit 1
          fi
          
          # Display file information
          echo "File size: $(du -h stream_file.mp4 | cut -f1)"
          echo "File info: $(ffprobe -v error -show_format -show_streams stream_file.mp4 | grep -E "duration|bit_rate|codec_name")"

      # 4. Pro Stream: Advanced settings with monitoring
      - name: Start Professional Stream
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          RTMP_URL: "rtmp://a.rtmp.youtube.com/live2"
        run: |
          # Verify key exists
          if [ -z "$STREAM_KEY" ]; then
            echo "Error: STREAM_KEY not set"
            exit 1
          fi
          
          # Create logs directory
          mkdir -p logs
          
          echo "Starting Optimized Stream to YouTube..."
          echo "Stream started at: $(date)" > logs/stream.log
          
          # Professional FFmpeg settings:
          # -re: Play at native frame rate
          # -stream_loop -1: Infinite loop
          # -fflags +genpts: Generate PTS timestamps
          # -use_wallclock_as_timestamps: Better sync
          # -flush_packets 1: Reduce latency
          # -max_muxing_queue_size 9999: Handle large packets
          
          # Use exec to run in same process
          exec ffmpeg -hide_banner -loglevel warning \
            -re -stream_loop -1 -i stream_file.mp4 \
            -fflags +genpts \
            -use_wallclock_as_timestamps 1 \
            -vcodec copy -acodec copy \
            -f flv \
            -flush_packets 1 \
            -max_muxing_queue_size 9999 \
            "${RTMP_URL}/${STREAM_KEY}" 2>&1 | tee -a logs/stream.log

      # 5. Health Check: Monitor stream status
      - name: Monitor Stream Health
        if: always()
        run: |
          # Display last 20 lines of log
          if [ -f logs/stream.log ]; then
            echo "=== Last 20 lines of stream log ==="
            tail -20 logs/stream.log
            echo "===================================="
          fi
          
          # Check for errors
          if [ -f logs/stream.log ] && grep -i "error\|failed" logs/stream.log; then
            echo "⚠️  Errors detected in stream!"
            exit 1
          fi

      # 6. Smart Cleanup: Intelligent cleanup with log retention
      - name: Smart Cleanup
        if: always()
        run: |
          # Delete only video (not logs)
          rm -f stream_file.mp4
          
          # Compress logs if too large
          if [ -f logs/stream.log ] && [ "$(stat -c%s logs/stream.log)" -gt 1048576 ]; then
            gzip -9 logs/stream.log
            echo "Logs compressed"
          fi
          
          echo "Cleanup completed at: $(date)"
          df -h  # Display remaining space
