name: Ultimate Stream 2026 - Test
on:
  workflow_dispatch:
    inputs:
      url1: { description: 'Video 1', required: true }
      url2: { description: 'Video 2', required: true }
      url3: { description: 'Video 3 (Audio Source)', required: true }
      bottom_text: { description: 'Scrolling Text', default: 'بث مباشر للاختبار - تغطية مستمرة' }
      stream_duration: { description: 'Hours', default: '1' }

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip3 install gdown
          mkdir -p videos

      - name: Download Videos
        run: |
          dl_gdrive() {
            ID=$(echo "$1" | grep -oE "[a-zA-Z0-9_-]{25,}" | head -1)
            [ -n "$ID" ] && gdown "https://drive.google.com/uc?id=$ID" -O "$2" --quiet || true
          }
          dl_gdrive "${{ github.event.inputs.url1 }}" "videos/v1.mp4"
          dl_gdrive "${{ github.event.inputs.url2 }}" "videos/v2.mp4"
          dl_gdrive "${{ github.event.inputs.url3 }}" "videos/v3.mp4"

      - name: Run Balanced Engine
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          # 1. خلفية سوداء
          ffmpeg -f lavfi -i "color=c=#050505:s=1920x1080" -frames:v 1 background.png -y

          # 2. بناء الفلاتر
          INPUTS="-re -loop 1 -i background.png"
          FILTER="[0:v]scale=1920:1080[bg];"
          LAST_V="bg"
          idx=1

          # فيديو 1
          if [ -s "videos/v1.mp4" ]; then
            INPUTS="$INPUTS -re -stream_loop -1 -i videos/v1.mp4"
            FILTER="${FILTER}[$idx:v]scale=850:478:force_original_aspect_ratio=increase,crop=850:478[v1];[$LAST_V][v1]overlay=5:5[ov1];"
            LAST_V="ov1"
            idx=$((idx+1))
          else
            FILTER="${FILTER}[$LAST_V]null[ov1];"
            LAST_V="ov1"
          fi

          # فيديو 2
          if [ -s "videos/v2.mp4" ]; then
            INPUTS="$INPUTS -re -stream_loop -1 -i videos/v2.mp4"
            FILTER="${FILTER}[$idx:v]scale=850:478:force_original_aspect_ratio=increase,crop=850:478[v2];[$LAST_V][v2]overlay=5:488[ov2];"
            LAST_V="ov2"
            idx=$((idx+1))
          else
            FILTER="${FILTER}[$LAST_V]null[ov2];"
            LAST_V="ov2"
          fi

          # فيديو 3 وصوت
          if [ -s "videos/v3.mp4" ]; then
            INPUTS="$INPUTS -re -stream_loop -1 -i videos/v3.mp4"
            FILTER="${FILTER}[$idx:v]scale=1055:961:force_original_aspect_ratio=increase,crop=1055:961[v3];[$LAST_V][v3]overlay=860:5[ov3];"
            LAST_V="ov3"
            AUDIO_MAP="-map $idx:a"
            idx=$((idx+1))
          else
            INPUTS="$INPUTS -f lavfi -i anullsrc=cl=stereo:sr=44100"
            AUDIO_MAP="-map $idx:a"
            FILTER="${FILTER}[$LAST_V]null[ov3];"
            LAST_V="ov3"
          fi

          # 3. الشريط الإخباري (Andalus + L to R)
          BAR_H=85
          FILTER="${FILTER}[$LAST_V]drawbox=y=ih-$BAR_H:w=iw:h=$BAR_H:color=0xEE0000@1.0:t=fill[v_bar];"
          FILTER="${FILTER}[v_bar]drawtext=text='${{ github.event.inputs.bottom_text }}':\
          fontfile=./Andalus.ttf:fontcolor=white:fontsize=48:\
          x=mod(130*t\,w+tw)-tw:y=h-($BAR_H/2)-25[v_out]"

          # 4. البث بإعدادات Balanced (No Lag)
          ffmpeg -hide_banner -loglevel warning $INPUTS \
            -filter_complex "$FILTER" -map "[v_out]" $AUDIO_MAP \
            -c:v libx264 -preset ultrafast -tune zerolatency \
            -b:v 5500k -maxrate 6000k -bufsize 6000k \
            -pix_fmt yuv420p -g 50 -keyint_min 50 \
            -c:a aac -b:a 128k -ar 44100 -f flv \
            -t $((${{ github.event.inputs.stream_duration }} * 3600)) \
            "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"
