name: Ultimate Stream 2026
on:
  workflow_dispatch:
    inputs:
      url1:
        description: 'الفيديو الأول (أعلى يسار)'
        required: true
      url2:
        description: 'الفيديو الثاني (أسفل يسار)'
        required: true
      url3:
        description: 'الفيديو الثالث (الجهة اليمنى + مصدر الصوت)'
        required: true
      bottom_text:
        description: 'النص الإخباري المتحرك (يدعم العربية)'
        default: 'بث مباشر - تغطية مستمرة لآخر الأخبار'
      stream_duration:
        description: 'مدة البث بالساعات'
        default: '6'

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 432
    steps:
      - uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core jq
          pip3 install gdown
          mkdir -p videos

      - name: Download Videos
        run: |
          dl_gdrive() {
            ID=$(echo "$1" | grep -oE "[a-zA-Z0-9_-]{25,}" | head -1)
            if [ -n "$ID" ]; then
              gdown "https://drive.google.com/uc?id=$ID" -O "$2" --quiet || true
            fi
          }
          dl_gdrive "${{ github.event.inputs.url1 }}" "videos/v1.mp4"
          dl_gdrive "${{ github.event.inputs.url2 }}" "videos/v2.mp4"
          dl_gdrive "${{ github.event.inputs.url3 }}" "videos/v3.mp4"

      - name: Run Engine
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          # 1. إنشاء خلفية سوداء (أو يمكنك استخدام صورتك الخاصة)
          ffmpeg -f lavfi -i "color=c=#0a0a0a:s=1920x1080" -frames:v 1 background.png -y

          # 2. بناء الأوامر ديناميكياً لتجنب أخطاء Index
          INPUTS="-re -loop 1 -i background.png"
          FILTER="[0:v]scale=1920:1080[bg];"
          LAST_V="bg"
          idx=1

          # التحقق من الفيديو 1
          if [ -s "videos/v1.mp4" ]; then
            INPUTS="$INPUTS -re -stream_loop -1 -i videos/v1.mp4"
            FILTER="${FILTER}[$idx:v]scale=845:475:force_original_aspect_ratio=increase,crop=845:475[v1];[$LAST_V][v1]overlay=10:10[ov1];"
            LAST_V="ov1"
            idx=$((idx+1))
          else
            FILTER="${FILTER}[$LAST_V]null[ov1];"
            LAST_V="ov1"
          fi

          # التحقق من الفيديو 2
          if [ -s "videos/v2.mp4" ]; then
            INPUTS="$INPUTS -re -stream_loop -1 -i videos/v2.mp4"
            FILTER="${FILTER}[$idx:v]scale=845:475:force_original_aspect_ratio=increase,crop=845:475[v2];[$LAST_V][v2]overlay=10:495[ov2];"
            LAST_V="ov2"
            idx=$((idx+1))
          else
            FILTER="${FILTER}[$LAST_V]null[ov2];"
            LAST_V="ov2"
          fi

          # التحقق من الفيديو 3 (مصدر الصوت)
          AUDIO_MAP=""
          if [ -s "videos/v3.mp4" ]; then
            INPUTS="$INPUTS -re -stream_loop -1 -i videos/v3.mp4"
            FILTER="${FILTER}[$idx:v]scale=1045:960:force_original_aspect_ratio=increase,crop=1045:960[v3];[$LAST_V][v3]overlay=865:10[ov3];"
            LAST_V="ov3"
            AUDIO_MAP="-map $idx:a"
            idx=$((idx+1))
          else
            INPUTS="$INPUTS -f lavfi -i anullsrc=cl=stereo:sr=44100"
            AUDIO_MAP="-map $idx:a"
            FILTER="${FILTER}[$LAST_V]null[ov3];"
            LAST_V="ov3"
          fi

          # 3. إضافة الشريط الإخباري (Lower Third) وتصميم النص العربي
          # رسم مستطيل أحمر في الأسفل
          BAR_COLOR="0xCC0000@0.9"
          FILTER="${FILTER}[$LAST_V]drawbox=y=ih-120:w=iw:h=100:color=$BAR_COLOR:t=fill[v_bar];"
          
          # إضافة النص المتحرك من اليمين إلى اليسار
          # x=w-mod(100*t,w+tw) تجعل النص يبدأ من اليمين
          FILTER="${FILTER}[v_bar]drawtext=text='${{ github.event.inputs.bottom_text }}':\
          fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf:\
          fontcolor=white:fontsize=50:\
          x=w-mod(110*t\,w+tw):y=h-90[v_out]"

          # 4. بدء البث المباشر
          ffmpeg -hide_banner -loglevel warning $INPUTS \
            -filter_complex "$FILTER" -map "[v_out]" $AUDIO_MAP \
            -c:v libx264 -preset veryfast -b:v 4500k -maxrate 5000k -bufsize 10000k \
            -pix_fmt yuv420p -g 50 -c:a aac -b:a 128k -ar 44100 -f flv \
            -t $((${{ github.event.inputs.stream_duration }} * 3600)) \
            "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"
