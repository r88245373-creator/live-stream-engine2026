name: 24/7 Twitch Professional Stream

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Enter the Proton Drive video URL'
        required: true
        default: ''

jobs:
  stream:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg firefox-geckodriver python3-pip
          pip install selenium

      - name: Download from Proton Drive using Selenium
        run: |
          VIDEO_URL="${{ github.event.inputs.video_url }}"
          
          # Create Python script to download from Proton Drive
          cat > download_proton.py << 'EOF'
          from selenium import webdriver
          from selenium.webdriver.firefox.options import Options
          from selenium.webdriver.common.by import By
          from selenium.webdriver.support.ui import WebDriverWait
          from selenium.webdriver.support import expected_conditions as EC
          import time
          import urllib.request
          import os

          # Setup Firefox headless
          options = Options()
          options.add_argument("--headless")
          driver = webdriver.Firefox(options=options)
          
          url = "https://drive.proton.me/urls/DSJKZE1FB0#8QiiImw6FQgn"
          print(f"Accessing {url}...")
          driver.get(url)
          
          # Wait for page to load
          time.sleep(5)
          
          # Look for download button
          try:
              # Try multiple possible selectors
              download_button = WebDriverWait(driver, 20).until(
                  EC.element_to_be_clickable((By.XPATH, "//button[contains(text(), 'Download')]"))
              )
              download_button.click()
              print("Clicked download button")
          except:
              print("Could not find download button")
              driver.save_screenshot("debug.png")
              print("Saved debug.png")
              
          time.sleep(5)
          driver.quit()
          EOF

          python3 download_proton.py

      - name: Alternative - Use curl with cookies
        run: |
          # First, get the actual file URL by parsing the page
          echo "Attempting to get direct download link..."
          
          # Use curl to get the page and extract the file URL
          curl -s -L "$VIDEO_URL" > proton_page.html
          
          # Look for video file patterns in the HTML
          grep -o 'https://[^"]*\.mp4' proton_page.html > video_url.txt || true
          grep -o 'https://[^"]*\.mov' proton_page.html >> video_url.txt || true
          grep -o 'https://[^"]*\.mkv' proton_page.html >> video_url.txt || true
          
          if [ -s video_url.txt ]; then
            DIRECT_URL=$(head -1 video_url.txt)
            echo "Found direct URL: $DIRECT_URL"
            wget -O final_video.mp4 "$DIRECT_URL"
          else
            echo "Could not find direct video URL in page"
            cat proton_page.html
          fi

      - name: Check if download succeeded
        run: |
          if [ -f final_video.mp4 ] && [ -s final_video.mp4 ]; then
            echo "Video downloaded successfully"
          else
            echo "Please provide a direct download link instead of a sharing page"
            echo "You can try:"
            echo "1. Right-click on the video file in Proton Drive"
            echo "2. Select 'Get link' or 'Share'"
            echo "3. Look for a 'Download' option or direct link"
            exit 1
          fi

      - name: Stream to Twitch
        env:
          STREAM_KEY: ${{ secrets.TWITCH_STREAM_KEY }}
        run: |
          echo "Starting Twitch stream..."
          ffmpeg -re -stream_loop -1 -i final_video.mp4 \
            -c copy -f flv "rtmp://live.twitch.tv/app/$STREAM_KEY"
