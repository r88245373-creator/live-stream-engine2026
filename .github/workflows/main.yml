name: 🔴 YouTube 24/7 - PRO KEYFRAME FIX

on:
  workflow_dispatch:
    inputs:
      link1: { required: true }
      link2: { required: true }
      link3: { required: true }

jobs:
  stream:
    runs-on: ubuntu-latest
    
    steps:
      - name: ⚡ Install Tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg -qq
          pip install -q gdown

      - name: 📥 Download Videos
        run: |
          # Extract IDs
          extract_id() {
            local link="$1"
            [[ "$link" =~ /file/d/([^/]+) ]] && echo "${BASH_REMATCH[1]}" && return
            [[ "$link" =~ id=([^&]+) ]] && echo "${BASH_REMATCH[1]}" && return
            echo "$link"
          }
          
          ID1=$(extract_id "${{ inputs.link1 }}")
          ID2=$(extract_id "${{ inputs.link2 }}")
          ID3=$(extract_id "${{ inputs.link3 }}")
          
          # Download videos
          gdown --id "$ID1" -O video1.mp4
          gdown --id "$ID2" -O video2.mp4
          gdown --id "$ID3" -O video3.mp4
          
          echo "✅ All videos downloaded"

      - name: 🔧 Fix Keyframes
        run: |
          # Create working directory
          mkdir -p fixed
          
          # Get FPS from first video
          FPS=$(ffprobe -v error -select_streams v:0 -show_entries stream=r_frame_rate -of default=noprint_wrappers=1:nokey=1 video1.mp4 | bc -l | awk '{printf "%.0f", $1}')
          [ -z "$FPS" ] && FPS=30
          GOP=$((FPS * 2))
          
          echo "🎯 FPS: $FPS | GOP: $GOP frames (2 seconds)"
          
          # Fix each video
          for i in 1 2 3; do
            echo "🛠️ Fixing video $i..."
            ffmpeg -i video$i.mp4 \
              -c:v libx264 -preset fast \
              -g $GOP \
              -keyint_min $GOP \
              -sc_threshold 0 \
              -c:a copy \
              -y fixed/fixed_$i.mp4
          done
          
          echo "✅ All videos fixed"

      - name: 🔴 Stream to YouTube
        env:
          KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          cd fixed
          
          # Create playlist
          echo "file 'fixed_1.mp4'" > playlist.txt
          echo "file 'fixed_2.mp4'" >> playlist.txt
          echo "file 'fixed_3.mp4'" >> playlist.txt
          
          echo "🚀 Starting stream..."
          echo "⏱️  Keyframes: 2 seconds"
          
          while true; do
            timeout 18000 ffmpeg -re -stream_loop -1 -f concat -safe 0 -i playlist.txt \
              -c copy \
              -f flv "rtmp://a.rtmp.youtube.com/live2/$KEY"
            
            echo "😴 Sleeping 90s..."
            sleep 90
          done
