name: 🔴 24/7 STREAM - YouTube & Twitch

on:
  workflow_dispatch:
    inputs:
      platform:
        description: '🌐 Streaming Platform (youtube/twitch/both)'
        required: true
        default: 'both'
      link1:
        description: '📹 Google Drive FULL URL for Video 1'
        required: true
      link2:
        description: '📹 Google Drive FULL URL for Video 2'
        required: true
      link3:
        description: '📹 Google Drive FULL URL for Video 3'
        required: true

jobs:
  stream:
    runs-on: ubuntu-latest

    steps:
      - name: ⚡ Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg bc -qq
          pip install -q gdown

      - name: 🔗 Extract Google Drive IDs
        run: |
          # Function to extract ID from Google Drive URL
          extract_id() {
            url="$1"
            # Extract ID using regex patterns for different URL formats
            # Pattern 1: /d/VIDEO_ID/view
            # Pattern 2: id=VIDEO_ID
            # Pattern 3: file/d/VIDEO_ID
            id=$(echo "$url" | grep -oP '(?<=/d/)[^/]+|(?<=id=)[^&]+|(?<=file/d/)[^/]+')
            if [ -z "$id" ]; then
              echo "❌ Could not extract ID from: $url"
              exit 1
            fi
            echo "$id"
          }
          
          # Extract IDs for all videos
          echo "📎 Extracting IDs from URLs..."
          
          VIDEO1_ID=$(extract_id "${{ inputs.link1 }}")
          echo "Video 1 ID: $VIDEO1_ID"
          
          VIDEO2_ID=$(extract_id "${{ inputs.link2 }}")
          echo "Video 2 ID: $VIDEO2_ID"
          
          VIDEO3_ID=$(extract_id "${{ inputs.link3 }}")
          echo "Video 3 ID: $VIDEO3_ID"
          
          # Save to environment for next steps
          echo "VIDEO1_ID=$VIDEO1_ID" >> $GITHUB_ENV
          echo "VIDEO2_ID=$VIDEO2_ID" >> $GITHUB_ENV
          echo "VIDEO3_ID=$VIDEO3_ID" >> $GITHUB_ENV
          
          # Save platform choice
          echo "PLATFORM=${{ inputs.platform }}" >> $GITHUB_ENV

      - name: 📥 Download videos
        run: |
          mkdir -p videos
          cd videos
          
          echo "📥 Downloading video 1..."
          gdown "$VIDEO1_ID" -O 1.mp4 || echo "⚠️ Failed to download video 1"
          
          echo "📥 Downloading video 2..."
          gdown "$VIDEO2_ID" -O 2.mp4 || echo "⚠️ Failed to download video 2"
          
          echo "📥 Downloading video 3..."
          gdown "$VIDEO3_ID" -O 3.mp4 || echo "⚠️ Failed to download video 3"
          
          echo "✅ Files in videos folder:"
          ls -la
          
          # Count successful downloads
          SUCCESS_COUNT=0
          [ -s "1.mp4" ] && SUCCESS_COUNT=$((SUCCESS_COUNT+1))
          [ -s "2.mp4" ] && SUCCESS_COUNT=$((SUCCESS_COUNT+1))
          [ -s "3.mp4" ] && SUCCESS_COUNT=$((SUCCESS_COUNT+1))
          
          if [ $SUCCESS_COUNT -eq 0 ]; then
            echo "❌ ERROR: No videos downloaded successfully!"
            exit 1
          else
            echo "✅ Successfully downloaded $SUCCESS_COUNT/3 videos"
          fi

      - name: 🔧 Prepare playlist and GOP
        run: |
          cd videos
          
          # Create playlist with only successfully downloaded videos
          > playlist.txt
          [ -s "1.mp4" ] && echo "file '1.mp4'" >> playlist.txt
          [ -s "2.mp4" ] && echo "file '2.mp4'" >> playlist.txt
          [ -s "3.mp4" ] && echo "file '3.mp4'" >> playlist.txt
          
          echo "📋 Playlist created with $(wc -l < playlist.txt) videos:"
          cat playlist.txt
          
          # Get FPS from first available video
          for video in 1.mp4 2.mp4 3.mp4; do
            if [ -s "$video" ]; then
              FPS=$(ffprobe -v error -select_streams v:0 -show_entries stream=r_frame_rate \
                    -of default=nokey=1:noprint_wrappers=1 "$video" | bc -l | awk '{printf "%.0f", $1}')
              if [ -n "$FPS" ] && [ "$FPS" -gt 0 ]; then
                break
              fi
            fi
          done
          
          # Default to 30 if FPS detection fails
          if [ -z "$FPS" ] || [ "$FPS" -eq 0 ]; then
            FPS=30
          fi
          
          GOP=$((FPS * 2))
          echo "🎯 FPS: $FPS | GOP: $GOP frames (2 seconds)"
          
          # Save values for next step
          echo "FPS=$FPS" >> $GITHUB_ENV
          echo "GOP=$GOP" >> $GITHUB_ENV

      - name: 🔴 Start 24/7 Stream
        env:
          YT_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          TWITCH_KEY: ${{ secrets.TWITCH_STREAM_KEY }}
        run: |
          cd videos
          
          echo "🚀 Starting 24/7 stream on platform: $PLATFORM"
          echo "🎬 Streaming videos in loop"
          
          # Verify playlist exists and has content
          if [ ! -f "playlist.txt" ] || [ ! -s "playlist.txt" ]; then
            echo "❌ ERROR: playlist.txt is empty or missing!"
            exit 1
          fi
          
          # Function to check if platform should be streamed
          should_stream() {
            target="$1"
            if [ "$PLATFORM" = "both" ] || [ "$PLATFORM" = "$target" ]; then
              return 0  # true
            else
              return 1  # false
            fi
          }
          
          # Counter for 5-hour sleep cycles
          CYCLE_COUNT=0
          
          while true; do
            CYCLE_COUNT=$((CYCLE_COUNT + 1))
            echo "▶️ Starting stream loop #$CYCLE_COUNT at $(date)"
            
            # YouTube streaming (if enabled and key exists)
            if should_stream "youtube" && [ -n "$YT_KEY" ]; then
              echo "📺 Streaming to YouTube..."
              ffmpeg -stream_loop -1 -re -f concat -safe 0 -i playlist.txt \
                -c:v libx264 -preset ultrafast -b:v 2500k -maxrate 2500k -bufsize 5000k \
                -g $GOP -keyint_min $GOP -forced-idr 1 \
                -c:a aac -b:a 128k -ar 44100 \
                -f flv "rtmp://a.rtmp.youtube.com/live2/$YT_KEY" &
              YT_PID=$!
            fi
            
            # Twitch streaming (if enabled and key exists)
            if should_stream "twitch" && [ -n "$TWITCH_KEY" ]; then
              echo "🎮 Streaming to Twitch..."
              ffmpeg -stream_loop -1 -re -f concat -safe 0 -i playlist.txt \
                -c:v libx264 -preset ultrafast -b:v 2500k -maxrate 2500k -bufsize 5000k \
                -g $GOP -keyint_min $GOP -forced-idr 1 \
                -c:a aac -b:a 128k -ar 44100 \
                -f flv "rtmp://live.twitch.tv/app/$TWITCH_KEY" &
              TWITCH_PID=$!
            fi
            
            # Check if any streams started
            if [ -z "$YT_PID" ] && [ -z "$TWITCH_PID" ]; then
              echo "❌ No streams started! Check platform selection and stream keys."
              exit 1
            fi
            
            # Stream for 5 hours
            echo "⏰ Streaming for 5 hours..."
            sleep 5h
            
            # Stop streaming processes
            echo "🛑 Stopping streams for 10 second break..."
            [ -n "$YT_PID" ] && kill $YT_PID 2>/dev/null
            [ -n "$TWITCH_PID" ] && kill $TWITCH_PID 2>/dev/null
            
            # Wait for processes to end
            wait $YT_PID 2>/dev/null
            wait $TWITCH_PID 2>/dev/null
            
            # 10 second break every 5 hours
            echo "😴 Taking a 10 second break..."
            sleep 10
            
            # Clear PIDs for next loop
            unset YT_PID
            unset TWITCH_PID
            
            echo "🔄 Restarting streams..."
          done
