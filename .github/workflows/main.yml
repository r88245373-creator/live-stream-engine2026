name: 24/7 Professional Live Stream (Ultra Fast)

on:
  schedule:
    - cron: '0 */6 * * *' # يعيد التشغيل كل 6 ساعات لضمان استمرار البث
  workflow_dispatch:
    inputs:
      video_link:
        description: 'Google Drive Video URL'
        required: true
        default: 'https://drive.google.com/file/d/1uPIsRiVT8rzx5Qmtp7_Ccg8sZIi-ucjW/view'

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Download Video from Google Drive
        env:
          # يستخدم الرابط المدخل يدوياً أو الرابط الافتراضي في حال التشغيل التلقائي
          RAW_INPUT: ${{ github.event.inputs.video_link || '1uPIsRiVT8rzx5Qmtp7_Ccg8sZIi-ucjW' }}
        run: |
          # 1. استخراج معرف الفيديو (ID) بذكاء من أي شكل للرابط
          VIDEO_ID=$(echo "$RAW_INPUT" | sed -E 's/.*\/d\/([^/]+).*/\1/' | sed -E 's/.*id=([^&]+).*/\1/')
          echo "Target Video ID: $VIDEO_ID"

          # 2. تخطي رسالة حماية جوجل للملفات الكبيرة باستخدام ملف الكوكيز
          CONFIRM=$(curl -sL --cookie-jar cookies.txt "https://docs.google.com/uc?export=download&id=${VIDEO_ID}" | sed -rn 's/.*confirm=([0-9A-Za-z_]+).*/\1/p')
          
          if [ -z "$CONFIRM" ]; then
            # تحميل الملف إذا كان صغيراً
            curl -sL --cookie cookies.txt "https://docs.google.com/uc?export=download&id=${VIDEO_ID}" -o stream_file.mp4
          else
            # تحميل الملف إذا كان كبيراً (يتطلب رمز تأكيد)
            curl -sL --cookie cookies.txt "https://docs.google.com/uc?export=download&confirm=${CONFIRM}&id=${VIDEO_ID}" -o stream_file.mp4
          fi

          # 3. التحقق من أن الملف فيديو حقيقي وليس صفحة خطأ
          FILE_SIZE=$(stat -c%s "stream_file.mp4")
          if [ "$FILE_SIZE" -lt 1000000 ]; then
            echo "Error: Download failed or file is too small ($FILE_SIZE bytes)."
            echo "Make sure the Google Drive link is set to 'Anyone with the link'."
            exit 1
          fi
          echo "Download Success! Size: $FILE_SIZE bytes"

      - name: Start Professional Stream
        env:
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          # إعدادات البث:
          # -re: سرعة البث الطبيعية
          # -stream_loop -1: تكرار الفيديو للأبد
          # -vcodec copy -acodec copy: نقل البيانات بدون معالجة (استهلاك 0% للمعالج وجودة أصلية)
          ffmpeg -re -stream_loop -1 -i stream_file.mp4 \
            -vcodec copy -acodec copy -f flv \
            "rtmp://a.rtmp.youtube.com/live2/$STREAM_KEY"

      - name: Cleanup
        if: always()
        run: rm -f stream_file.mp4 cookies.txt
